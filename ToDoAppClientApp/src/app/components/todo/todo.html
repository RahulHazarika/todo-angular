<div class="todo-header">
  <h2>Todo App</h2>
</div>

<!-- Add Todo -->
<div>
  <input class="todo-text" [(ngModel)]="newTodoTitle"
         placeholder="Enter todo" (keyup.enter)="addTodo()" />

  <button class="btn btn-add" (click)="addTodo()">Add</button>
</div>
<div>
  <p *ngIf="errorMessage" style="color: red;">{{ errorMessage }}</p>
</div>

<hr />

<div style="display: flex; gap: 8px; margin-bottom: 1rem;">

  <div style="background: var(--color-background-secondary); padding: 6px 12px; text-align: center; border-radius: 6px;">
    <p style="font-size: 11px; color: var(--color-text-secondary);">Total</p>
    <p style="font-size: 16px; font-weight: 500;">{{ totalCount }}</p>
  </div>

  <div style="background: #E1F5EE; padding: 6px 12px; text-align: center; border-radius: 6px;">
    <p style="font-size: 11px; color: #0F6E56;">Completed</p>
    <p style="font-size: 16px; font-weight: 500; color: #0F6E56;">{{ completedCount }}</p>
  </div>

  <div style="background: #FAEEDA; padding: 6px 12px; text-align: center; border-radius: 6px;">
    <p style="font-size: 11px; color: #854F0B;">Pending</p>
    <p style="font-size: 16px; font-weight: 500; color: #854F0B;">{{ pendingCount }}</p>
  </div>

</div>
<!-- Todo List -->
<ul>
  <li *ngFor="let todo of todos">

    <!-- Checkbox -->
    <input type="checkbox"
           [checked]="todo.isCompleted" (change)="saveEditOnCheckBox(todo)" />

    <!-- Title -->
    <span class="todo-text" [style.textDecoration]="todo.isCompleted ? 'line-through' : 'none'">
      {{ todo.title }}
    </span>

    <!-- Actions -->
    <button class="btn btn-edit" (click)="startEdit(todo)" [disabled]="todo.isCompleted">Edit</button>
    <button class="btn btn-delete" (click)="deleteTodo(todo.id)">Delete</button>

    <!-- Edit Mode -->
    <div *ngIf="editingId === todo.id">
      <input class="todo-text"[(ngModel)]="editTitle" (keyup.enter)="saveEdit(todo)" />
      <button class="btn btn-save" (click)="saveEdit(todo)">Save</button>
    </div>

  </li>
</ul>
<style>
  button {
    padding: 6px 16px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    margin: 1px 5px 5px 1px;
  }

  .btn-delete {
    background-color: #dc3545; /* Crimson red */
    color: #ffffff;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.2s ease, transform 0.1s ease;
  }

  .btn-edit {
    background-color: #007bff; /* Vibrant blue */
    color: #ffffff;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.2s ease, transform 0.1s ease;
  }

  .btn-add {
    background-color: #28a745; /* Success green */
    color: #ffffff;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.2s ease, transform 0.1s ease;
  }
  .btn-save {
    background-color: #0d6efd; /* Primary blue */
    color: #ffffff;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 2px 4px rgba(13, 110, 253, 0.2); /* Soft blue shadow */
    transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
  }

  .todo-text {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: #212529;
    line-height: 1.5;
    transition: all 0.25s ease-in-out;
  }

  .todo-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
    border-bottom: 2px solid #f1f3f5;
    padding-bottom: 12px;
  }

    .todo-header h2 {
      font-size: 28px;
      font-weight: 800;
      color: #1a1d20; /* Dark, high-contrast title */
      margin: 0;
      letter-spacing: -0.5px;
    }
  .btn:active {
    transform: scale(0.97); /* Subtle press-down feel */
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }
</style>
